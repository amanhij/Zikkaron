  - name: Implement GTE-Reranker with FlashRank fallback
    prompt: |
      Read zikkaron/retrieval.py fully, especially _cross_encoder_rerank().

      Modify `_cross_encoder_rerank()` to support GTE-Reranker-ModernBERT-base as the
      primary cross-encoder, with FlashRank as fallback.

      The current implementation uses FlashRank's Ranker class. Change the logic to:

      1. If `GTE_RERANKER_ENABLED` is True:
         a. Try to load sentence_transformers.CrossEncoder with the GTE model
         b. Lazy-load: store on `self._gte_reranker` (None initially)
         c. Score pairs using `self._gte_reranker.predict([(query, doc) for doc in docs])`
         d. The GTE model returns a single relevance score per pair
         e. If loading fails (import error, model download error), fall through to FlashRank

      2. If GTE fails or is disabled, and `GTE_RERANKER_FALLBACK_TO_FLASHRANK` is True:
         a. Use existing FlashRank logic (already implemented)

      3. Store scores as `_cross_encoder_score` on each memory dict (existing behavior)

      Implementation detail:
      ```python
      def _cross_encoder_rerank(self, query: str, memories: list[dict],
                                  top_k: int | None = None) -> list[dict]:
          if not memories:
              return memories
          top_k = top_k or self._settings.CROSS_ENCODER_TOP_K

          scored = False

          # Try GTE-Reranker first
          if getattr(self._settings, 'GTE_RERANKER_ENABLED', False):
              try:
                  if self._gte_reranker is None:
                      from sentence_transformers import CrossEncoder
                      self._gte_reranker = CrossEncoder(
                          self._settings.GTE_RERANKER_MODEL,
                          max_length=self._settings.GTE_RERANKER_MAX_LENGTH,
                      )
                      logger.info("Loaded GTE-Reranker: %s", self._settings.GTE_RERANKER_MODEL)

                  pairs = [(query, m["content"][:512]) for m in memories]
                  scores = self._gte_reranker.predict(pairs)
                  for i, mem in enumerate(memories):
                      mem["_cross_encoder_score"] = float(scores[i])
                  scored = True
              except Exception as e:
                  logger.warning("GTE-Reranker failed, falling back: %s", e)
                  self._gte_reranker = False  # Prevent retry

          # FlashRank fallback
          if not scored and getattr(self._settings, 'GTE_RERANKER_FALLBACK_TO_FLASHRANK', True):
              # ... existing FlashRank logic ...
          ```

      Add `self._gte_reranker = None` in __init__() alongside existing initialization.

      IMPORTANT: Keep all existing FlashRank code as fallback. The GTE reranker is
      an ADDITIONAL path, not a replacement. If GTE can't load (no GPU, no model),
      FlashRank still works.
