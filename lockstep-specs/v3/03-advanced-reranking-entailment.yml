# 03-advanced-reranking-entailment.yml — GTE-Reranker + NLI Entailment + Multi-Passage + DualCSE Prep
version: "1"
config:
  agent: claude-code
  max_retries: 3
  step_timeout: 600
  working_directory: "/home/cryptalis/Zikkaron"
context: |
  Replace FlashRank CE with GTE-Reranker-ModernBERT, add NLI entailment scoring,
  multi-passage reranking, and prepare dual-vector architecture.

  ## Problem
  FlashRank CE (ms-marco-MiniLM, 33M) is proven to be "semantic BM25" — scores
  "camping trips" at 0.013 relevance to "national park". GTE-Reranker (149M, ModernBERT)
  has better zero-shot OOD generalization. NLI can detect if a document ENTAILS the
  answer to a query. Multi-passage aggregation combines scattered evidence.

  ## Architecture
  - Retrieval: zikkaron/retrieval.py — HippoRetriever, _cross_encoder_rerank()
  - Config: zikkaron/config.py — Settings
  - Storage: zikkaron/storage.py — sqlite-vec memory_vectors
  - Embeddings: zikkaron/embeddings.py — EmbeddingEngine
  - Specs 01 and 02 add enrichment + profiles + convex fusion

