  - name: Add convex fusion and comparison routing to retrieval
    prompt: |
      Read zikkaron/retrieval.py fully.

      Add THREE new capabilities:

      ## 1. Convex Combination Fusion

      Add `_convex_fuse` method to HippoRetriever:
      ```python
      def _convex_fuse(self, signal_scores: dict[str, dict[int, float]],
                        weights: dict[str, float]) -> list[tuple[int, float]]:
          """Convex combination of normalized signal scores.

          Unlike RRF which uses ranks, this uses actual scores with min-max normalization.
          Proven to outperform RRF (Bruch et al., ACM TOIS 2023).
          """
          total_w = sum(weights.values())
          if total_w == 0:
              return []
          norm_weights = {k: v/total_w for k, v in weights.items()}

          normalized: dict[str, dict[int, float]] = {}
          for signal, scores in signal_scores.items():
              if not scores:
                  continue
              vals = list(scores.values())
              min_s, max_s = min(vals), max(vals)
              range_s = max_s - min_s
              if range_s > 0:
                  normalized[signal] = {mid: (s - min_s) / range_s for mid, s in scores.items()}
              else:
                  normalized[signal] = {mid: 0.5 for mid in scores}

          all_mids = set()
          for scores in normalized.values():
              all_mids.update(scores.keys())

          combined = {}
          for mid in all_mids:
              combined[mid] = sum(
                  norm_weights.get(sig, 0) * normalized.get(sig, {}).get(mid, 0)
                  for sig in normalized
              )
          return sorted(combined.items(), key=lambda x: x[1], reverse=True)
      ```

      ## 2. Comparison Query Routing

      Add `_comparison_dual_search` method:
      ```python
      def _comparison_dual_search(self, query: str, options: list[str],
                                    subject: str | None, max_results: int) -> list[dict]:
          """Dual-search for comparison queries like 'A or B?'"""
          all_results = []
          option_scores = {}

          for option in options[:2]:  # Max 2 options
              sub_query = f"{subject} {option}" if subject else option
              results = self._vector_search(sub_query, top_k=self._settings.COMPARISON_TOP_K_PER_OPTION)
              # Also do FTS
              fts_results = self._storage.search_memories_fts(sub_query, limit=self._settings.COMPARISON_TOP_K_PER_OPTION)
              # Merge
              seen = set()
              merged = []
              for r in results + fts_results:
                  mid = r.get("id", r.get("memory_id", -1))
                  if mid not in seen:
                      seen.add(mid)
                      r["_comparison_option"] = option
                      merged.append(r)
              option_scores[option] = merged
              all_results.extend(merged)

          # Deduplicate
          seen = set()
          unique = []
          for r in all_results:
              mid = r.get("id", r.get("memory_id", -1))
              if mid not in seen:
                  seen.add(mid)
                  unique.append(r)

          return unique[:max_results * 2]
      ```

      ## 3. Profile and Belief Search Integration

      Add `_search_profiles_and_beliefs` method:
      ```python
      def _search_profiles_and_beliefs(self, query: str, directory: str | None,
                                         max_results: int) -> list[dict]:
          """Search structured profiles and derived beliefs."""
          extra_results = []

          # Search profiles
          if getattr(self._settings, 'PROFILE_EXTRACTION_ENABLED', False):
              try:
                  profiles = self._storage.search_profiles_fts(query, limit=max_results)
                  for p in profiles:
                      extra_results.append({
                          "id": -p.get("id", 0),  # Negative to distinguish from memories
                          "content": f"{p['entity_name']}: {p['attribute_type']} = {p['attribute_value']}",
                          "_source": "profile",
                          "_retrieval_score": self._settings.PROFILE_SEARCH_WEIGHT,
                      })
              except Exception:
                  pass

          # Search beliefs
          if getattr(self._settings, 'DERIVED_BELIEFS_ENABLED', False):
              try:
                  beliefs = self._storage.search_beliefs_fts(query, limit=max_results)
                  boost = self._settings.BELIEF_HIGH_CONFIDENCE_BOOST
                  for b in beliefs:
                      score = b.get("confidence", 0.5) * boost if b.get("confidence", 0) > 0.7 else b.get("confidence", 0.5)
                      extra_results.append({
                          "id": -b.get("id", 0) - 100000,  # Negative offset to distinguish
                          "content": b["content"],
                          "_source": "belief",
                          "_retrieval_score": score,
                      })
              except Exception:
                  pass

          return extra_results
      ```

      ## Integration in recall()

      In the recall() method:

      1. Check `self._settings.FUSION_METHOD`:
         - If "convex": collect raw scores from each signal into a dict, call _convex_fuse()
         - If "wrrf" (or anything else): use existing _wrrf_fuse()
         - The convex path needs the raw scores, not just ranks. Collect them from each
           signal's scoring step.

      2. After initial fusion and before CE reranking, check for comparison queries:
         ```python
         if (getattr(self._settings, 'COMPARISON_DUAL_SEARCH_ENABLED', False)
                 and comparison_options):
             comp_results = self._comparison_dual_search(query, comparison_options, subject, max_results)
             # Merge into candidate pool
         ```

      3. After CE reranking, search profiles and beliefs:
         ```python
         profile_belief_results = self._search_profiles_and_beliefs(query, directory, max_results)
         if profile_belief_results:
             result_memories.extend(profile_belief_results)
             result_memories.sort(key=lambda m: m.get("_retrieval_score", 0), reverse=True)
             result_memories = result_memories[:max_results]
         ```

      IMPORTANT: The convex fusion is an ALTERNATIVE path to WRRF, controlled by FUSION_METHOD
      config. Both must work. The comparison routing and profile/belief search are additions
      that work with either fusion method.
