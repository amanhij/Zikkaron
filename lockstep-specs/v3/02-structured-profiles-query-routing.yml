# 02-structured-profiles-query-routing.yml — Memobase Profiles + Hindsight Beliefs + CompUGE + Convex Fusion
version: "1"
config:
  agent: claude-code
  max_retries: 3
  step_timeout: 600
  working_directory: "/home/cryptalis/Zikkaron"
context: |
  We are implementing structured user profiles (Memobase-style), derived beliefs
  (Hindsight-style), comparison query routing (CompUGE), and Convex Combination
  fusion to replace RRF.

  ## Problem
  26% of failures need multi-memory aggregation. "What are Melanie's personality traits?"
  requires synthesizing dozens of scattered memories. No single memory scores high enough.
  Comparison questions "A or B?" need dual-search. RRF is suboptimal vs Convex Combination.

  ## Architecture
  - Storage: zikkaron/storage.py — StorageEngine, SQLite
  - Retrieval: zikkaron/retrieval.py — HippoRetriever with WRRF + FlashRank CE
  - Config: zikkaron/config.py — Settings dataclass
  - Spec 01 adds enrichment pipeline (this spec builds on top of it)

steps:
