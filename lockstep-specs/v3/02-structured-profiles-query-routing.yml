      ```python
      """Memobase-style structured user profiles + Hindsight derived beliefs."""
      import json
      import logging
      import re
      from datetime import datetime, timezone

      from zikkaron.config import Settings
      from zikkaron.storage import StorageEngine

      logger = logging.getLogger(__name__)
      ```

      Implement **ProfileExtractor** class:

      1. Constructor takes StorageEngine and Settings.

      2. `extract_and_store(content: str, memory_id: int, directory_context: str)`:
         - Run rule-based extraction on content
         - For each extracted attribute, call storage.insert_profile()
         - Log extraction results at DEBUG level

      3. Rule-based extraction patterns (method `_extract_attributes`):
         Returns list of (entity_name, attribute_type, attribute_key, attribute_value, confidence) tuples.

         Patterns to implement:
         - `{Name} likes/loves/enjoys/prefers {X}` → (Name, "interest", X_normalized, X, 0.7)
         - `{Name} is {adjective}` → (Name, "trait", adjective, adjective, 0.7)
         - `{Name} went to/visited/traveled to {place}` → (Name, "interest", "travel", place, 0.6)
         - `{Name} works as/is a {job}` → (Name, "career", job_normalized, job, 0.7)
         - `{Name} believes/thinks {X}` → (Name, "opinion", X_normalized, X, 0.6)
         - `{Name} wants to/hopes to {X}` → (Name, "goal", X_normalized, X, 0.6)
         - `{Name} always/usually/often {X}` → (Name, "habit", X_normalized, X, 0.6)

         Name detection: Use regex `r'\b([A-Z][a-z]+)\b'` to find proper nouns.
         X_normalized: lowercase, replace spaces with underscores, first 50 chars.

      4. `generate_profile_summary(entity_name: str, directory_context: str) -> str | None`:
         - Get all profiles for entity from storage
         - If fewer than 3 attributes, return None
         - Build natural language summary: "{Name} is {traits}. {Name} enjoys {interests}. {Name} works as {career}."
         - Return the summary string

      Implement **BeliefDeriver** class:

      1. Constructor takes StorageEngine and Settings.

      2. `derive_from_memory(content: str, memory_id: int, directory_context: str)`:
         - Check if content implies a belief (trait, preference, relationship, pattern, summary)
         - Use simple rules similar to ProfileExtractor but for higher-level inferences
         - For trait beliefs: if multiple memories mention similar activities, derive a trait
           e.g., camping + hiking + fishing → "enjoys outdoor activities"
         - Call storage.insert_belief() for each derived belief

      3. `derive_from_profiles(entity_name: str, directory_context: str)`:
         - Get all profiles for entity
         - Group by attribute_type
         - If 3+ interests in same category → derive a preference belief
         - If 2+ traits → derive a personality summary belief
         - Store derived beliefs with high confidence (0.7)

