# 10-integration-tuning-validation.yml — Integration & Validation
version: "1"
config:
  agent: claude-code
  max_retries: 3
  step_timeout: 600
  working_directory: "/home/cryptalis/Zikkaron"
context: |
  Final integration, tuning, and validation of all retrieval V2 enhancements.

  ## What was implemented (specs 01-09):
  1. WRRF fusion (rank-based scoring)
  2. Query router (signal routing by query type)
  3. Confidence gating (signal confidence computation)
  4. Temporal retrieval (date-aware retrieval)
  5. Cross-encoder reranking (optional)
  6. BM25/FTS5 enhancements (better query preprocessing)
  7. Graph signal optimization (PPR/spreading tuning)
  8. Adversarial protection (score distribution analysis)
  9. Embedding enhancement (candidate pool, caching)

  ## Goal
  Verify all components work together, run full test suite, and validate
  with LoCoMo benchmark targeting MRR > 0.45.

steps:
  - name: Run full test suite and verify integration
    prompt: |
      Run the full Zikkaron test suite:
        python3 -m pytest zikkaron/tests/ -x -q

      If any tests fail, fix them. Common issues:
      - Import errors from new methods
      - Missing config settings (all should be in config.py already)
      - Type mismatches in new code

      After tests pass, verify all new features are importable:
        python3 -c "from zikkaron.retrieval import HippoRetriever; print('retrieval ok')"
        python3 -c "from zikkaron.config import Settings; s = Settings(); print('WRRF_K:', s.WRRF_K, 'ROUTING:', s.QUERY_ROUTING_ENABLED)"
        python3 -c "from zikkaron.storage import StorageEngine; print('storage ok')"
        python3 -c "from zikkaron.embeddings import EmbeddingEngine; print('embeddings ok')"
    validate:
      - type: command_passes
        command: "python3 -m pytest zikkaron/tests/ -x -q 2>&1 | tail -5"
        timeout: 600
      - type: command_passes
        command: "python3 -c \"from zikkaron.retrieval import HippoRetriever; from zikkaron.config import Settings; s = Settings(); assert s.WRRF_K == 60; assert s.QUERY_ROUTING_ENABLED; assert s.ADVERSARIAL_DETECTION_ENABLED; print('all ok')\""

  - name: Run LoCoMo benchmark
    prompt: |
      Run the LoCoMo benchmark:
        python3 -m pytest benchmarks/test_e_locomo.py::TestLoCoMoSingleConversation -v -s

      Report the results. Target: MRR > 0.45.
      If MRR is below target, analyze which categories are weakest and suggest tuning.
    validate:
      - type: command_passes
        command: "python3 -c \"from zikkaron.retrieval import HippoRetriever; print('benchmark ready')\""
