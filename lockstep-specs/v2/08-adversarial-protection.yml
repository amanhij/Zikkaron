# 08-adversarial-protection.yml — Adversarial Protection & Calibration
version: "1"
config:
  agent: claude-code
  max_retries: 3
  step_timeout: 600
  working_directory: "/home/cryptalis/Zikkaron"
context: |
  We are adding adversarial detection and protection to Zikkaron's retrieval.

  ## Problem
  Adversarial queries present false premises or ask about things that didn't happen.
  The retrieval system returns memories that partially match but don't actually answer it.

  ## Solution: Score Distribution Analysis
  1. After fusion, analyze the score distribution of top results
  2. If scores are clustered (low gap between top results), flag as uncertain
  3. For flagged queries, apply diversity enforcement
  4. Add a confidence indicator to results

  ## Config settings already in config.py:
  ADVERSARIAL_DETECTION_ENABLED, ADVERSARIAL_SCORE_GAP_THRESHOLD,
  ADVERSARIAL_DIVERSITY_ENFORCEMENT, ADVERSARIAL_MIN_CONFIDENCE

  ## Files to Modify
  - zikkaron/retrieval.py — Add score analysis and confidence

steps:
  - name: Implement adversarial detection in retrieval
    prompt: |
      Read zikkaron/retrieval.py fully. Focus on the recall() method.

      Add a new method `_detect_adversarial` to HippoRetriever:

      ```python
      def _detect_adversarial(self, result_memories: list[dict]) -> dict:
          """Analyze result score distribution for adversarial indicators.

          Returns dict with:
          - "is_uncertain": bool — whether the results look unreliable
          - "confidence": float — overall confidence in the result set (0-1)
          - "score_gap": float — gap between top-1 and top-2 scores
          """
      ```

      Implementation:
      1. If fewer than 2 results, return confident (confidence=1.0 if 1 result, 0.0 if 0).
      2. Extract _retrieval_score from each result.
      3. Compute score_gap = scores[0] - scores[1].
      4. Compute confidence:
         - If score_gap < ADVERSARIAL_SCORE_GAP_THRESHOLD: confidence = score_gap / threshold * 0.5
         - Else: confidence = min(1.0, 0.5 + score_gap)
      5. is_uncertain = confidence < ADVERSARIAL_MIN_CONFIDENCE

      Then in recall(), AFTER reranking and BEFORE rules engine, add:

      ```python
      # Adversarial detection
      if self._settings.ADVERSARIAL_DETECTION_ENABLED and result_memories:
          adv_info = self._detect_adversarial(result_memories)
          for mem in result_memories:
              mem["_retrieval_confidence"] = adv_info["confidence"]
          if adv_info["is_uncertain"]:
              logger.debug(
                  "Low retrieval confidence (%.3f), score_gap=%.3f",
                  adv_info["confidence"], adv_info["score_gap"]
              )
      ```
    validate:
      - type: file_contains
        path: zikkaron/retrieval.py
        pattern: "_detect_adversarial"
      - type: file_contains
        path: zikkaron/retrieval.py
        pattern: "_retrieval_confidence"
      - type: command_passes
        command: "python3 -c \"from zikkaron.retrieval import HippoRetriever; print('import ok')\""

  - name: Add adversarial tests and validate
    prompt: |
      Read zikkaron/tests/test_retrieval.py.

      Add tests:

      1. test_detect_adversarial_high_confidence:
         Results with large score gap → confidence > 0.5, is_uncertain = False.

      2. test_detect_adversarial_low_confidence:
         Results with very small score gap (< 0.05) → low confidence, is_uncertain = True.

      3. test_detect_adversarial_single_result:
         Single result → confidence = 1.0.

      4. test_detect_adversarial_empty:
         No results → confidence = 0.0.

      Run all tests:
        python3 -m pytest zikkaron/tests/ -x -q
    validate:
      - type: command_passes
        command: "python3 -m pytest zikkaron/tests/ -x -q 2>&1 | tail -5"
        timeout: 600
