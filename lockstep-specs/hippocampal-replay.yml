  - name: "Create hook scripts and install_hooks tool"
    prompt: |
      Create the Claude Code hook shell scripts and the install_hooks MCP tool.

      1. Create `zikkaron/hooks/pre-compact-drain.sh`:
      ```bash
      #!/usr/bin/env bash
      # Zikkaron Hippocampal Replay — PreCompact Hook
      # Drains context into Zikkaron before Claude Code compacts the conversation.
      # Reads hook input from stdin (JSON with session_id, cwd, trigger).

      ZIKKARON_PORT="${ZIKKARON_PORT:-8742}"
      ZIKKARON_URL="http://localhost:${ZIKKARON_PORT}"

      # Read hook input from stdin
      INPUT=$(cat)

      # Extract cwd from hook input, fallback to current directory
      CWD=$(echo "$INPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('cwd',''))" 2>/dev/null || echo "")
      if [ -z "$CWD" ]; then
          CWD=$(pwd)
      fi

      # Call Zikkaron's pre-compact endpoint
      curl -s -X POST "${ZIKKARON_URL}/hooks/pre-compact" \
          -H "Content-Type: application/json" \
          -d "{\"cwd\": \"${CWD}\"}" \
          -m 5 > /dev/null 2>&1

      exit 0
      ```

      2. Create `zikkaron/hooks/post-compact-rehydrate.sh`:
      ```bash
      #!/usr/bin/env bash
      # Zikkaron Hippocampal Replay — PostCompact Rehydration Hook
      # Restores context from Zikkaron after Claude Code compacts the conversation.
      # stdout is injected into Claude's context.

      ZIKKARON_PORT="${ZIKKARON_PORT:-8742}"
      ZIKKARON_URL="http://localhost:${ZIKKARON_PORT}"

      # Get current directory for context
      CWD=$(pwd)

      # Call Zikkaron's post-compact endpoint and extract the formatted markdown
      RESPONSE=$(curl -s "${ZIKKARON_URL}/hooks/post-compact?directory=${CWD}" -m 10 2>/dev/null)

      if [ $? -eq 0 ] && [ -n "$RESPONSE" ]; then
          # Extract the "formatted" field from JSON response
          FORMATTED=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('formatted',''))" 2>/dev/null)
          if [ -n "$FORMATTED" ]; then
              echo "$FORMATTED"
          fi
      fi

      exit 0
      ```

      3. Create the directory for hook scripts:
         Run: `mkdir -p zikkaron/hooks`

      4. Make both scripts executable:
         Run: `chmod +x zikkaron/hooks/pre-compact-drain.sh zikkaron/hooks/post-compact-rehydrate.sh`

      5. Now add the `install_hooks` MCP tool to `zikkaron/server.py`.
         Read server.py first, then add this tool AFTER the `anchor` tool (before the MCP Resources section):

      ```python
      @mcp_server.tool()
      def install_hooks(project_directory: str = "") -> dict:
          """Install Claude Code hooks for automatic Hippocampal Replay.

          Creates PreCompact and SessionStart hooks in the project's .claude/ directory.
          After installation, context drain/restore happens automatically on every compaction.

          project_directory: The project root. Defaults to cwd.
          """
          import shutil

          project_dir = Path(project_directory) if project_directory else Path.cwd()
          claude_dir = project_dir / ".claude"
          hooks_dir = claude_dir / "hooks"
          hooks_dir.mkdir(parents=True, exist_ok=True)

          # Copy hook scripts from package
          package_hooks = Path(__file__).parent / "hooks"

          pre_compact_src = package_hooks / "pre-compact-drain.sh"
          post_compact_src = package_hooks / "post-compact-rehydrate.sh"
          pre_compact_dst = hooks_dir / "pre-compact-drain.sh"
          post_compact_dst = hooks_dir / "post-compact-rehydrate.sh"

          shutil.copy2(pre_compact_src, pre_compact_dst)
          shutil.copy2(post_compact_src, post_compact_dst)
          pre_compact_dst.chmod(0o755)
          post_compact_dst.chmod(0o755)

          # Write hooks configuration
          settings_path = claude_dir / "settings.json"
          settings_data = {}
          if settings_path.exists():
              try:
                  settings_data = json.loads(settings_path.read_text())
              except Exception:
                  settings_data = {}

          hooks_config = settings_data.get("hooks", {})

          # PreCompact hook — drain context before compaction
          hooks_config["PreCompact"] = [
              {
                  "matcher": "",
                  "hooks": [
                      {
                          "type": "command",
                          "command": str(pre_compact_dst),
                      }
                  ],
              }
          ]

          # SessionStart hook — restore context after compaction
          hooks_config["SessionStart"] = hooks_config.get("SessionStart", [])
          # Check if we already have a compact matcher
          has_compact = any(
              h.get("matcher") == "compact" for h in hooks_config["SessionStart"]
          )
          if not has_compact:
              hooks_config["SessionStart"].append({
                  "matcher": "compact",
                  "hooks": [
                      {
                          "type": "command",
                          "command": str(post_compact_dst),
                      }
                  ],
              })

          settings_data["hooks"] = hooks_config
          settings_path.write_text(json.dumps(settings_data, indent=2))

          return {
              "status": "installed",
              "project_directory": str(project_dir),
              "hooks_directory": str(hooks_dir),
              "pre_compact_hook": str(pre_compact_dst),
              "post_compact_hook": str(post_compact_dst),
              "settings_file": str(settings_path),
          }
      ```

      Create the hook scripts and add the tool. Make sure the hooks directory and scripts exist and are executable.
