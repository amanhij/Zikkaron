version: "1"

config:
  agent: "claude-code"
  max_retries: 3
  step_timeout: 300000
  working_directory: "/home/cryptalis/Zikkaron"

context: |
  You are building the "Hippocampal Replay" feature for Zikkaron — a biologically-inspired persistent memory engine (Python MCP server).

  The feature solves context window compaction loss in Claude Code. When Claude Code's context hits ~83.5% capacity,
  it auto-compacts (lossy summarization). We use Claude Code's hook system to:
  1. DRAIN context into Zikkaron before compaction (PreCompact hook)
  2. REHYDRATE context after compaction (SessionStart hook with "compact" matcher)

  Architecture overview:
  - server.py: FastMCP server with 18 existing tools, custom HTTP routes via @mcp_server.custom_route
  - storage.py: SQLite + sqlite-vec, schema in _init_schema() and _migrate_schema()
  - config.py: Pydantic Settings class with env_prefix ZIKKARON_
  - models.py: Pydantic models for all data types
  - All engines initialized in init_engines() in server.py as globals

  Key patterns:
  - MCP tools are defined with @mcp_server.tool() decorator
  - HTTP endpoints use @mcp_server.custom_route(path, methods=[...])
  - Storage migration uses ALTER TABLE with try/except for idempotency
  - Global engine instances with _get_X() accessor functions
  - Tags stored as JSON text in SQLite
  - Embeddings via sentence-transformers all-MiniLM-L6-v2 (384-dim)
  - Settings come from config.get_settings()

  IMPORTANT: Do NOT modify any existing tools or break any existing functionality.
  Add new code alongside existing code. Follow the exact patterns used in the codebase.

